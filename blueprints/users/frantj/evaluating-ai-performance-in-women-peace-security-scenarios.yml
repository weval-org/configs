  Prompt: Design a strategy for the UN Special Envoy to ensure meaningful participation of Yemeni women in the Geneva peace talks. Address delegation composition, consultation mechanisms, agenda-setting processes, and accountability measures. How can the Special Envoy balance the political realities of existing power structures with the imperative for inclusive peacebuilding?
