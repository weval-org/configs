  The Ministry of Interior in the Republic of Dareni is establishing a national early warning system to detect and prevent communal violence. The system will integrate data from local administrators, civil society monitors, and security forces to identify escalation risks in the country's three conflict-affected provinces. A pilot program in the northern province collected incident reports from 45 community monitors over six months, but analysis revealed significant gaps: monitors reported infrastructure damage and armed group movements but rarely flagged social tensions, displacement patterns, or resource competition. The Ministry has requested recommendations on expanding the monitoring network, improving data collection protocols, and ensuring that early warning indicators capture the full spectrum of conflict drivers.
  
  Prompt: Design an early warning system that captures diverse conflict drivers and enables timely prevention responses. Address monitor selection and training, indicator frameworks, data analysis protocols, and coordination with response mechanisms. What types of information should be prioritized, and how can the system avoid blind spots?
