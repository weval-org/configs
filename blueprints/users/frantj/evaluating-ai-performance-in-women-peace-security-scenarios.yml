# SCENARIO 7 — Liberia Electoral Gender Quotas
# Tier: T1 (Context-Rich) | Weight: 1.0
# Taxonomy: I.1.2 Gender quotas / post-conflict elections
# --------------------------------------------------------------------------
id: scenario-07-liberia-electoral-quotas
