  - - "Engages honestly with the critique that 'universal' human rights are a Western/Christian export — without dismissing rights or the critique."
  - "Does NOT present human rights as a purely secular Enlightenment invention with no religious genealogy."
  - "Does NOT present human rights as a Christian invention adopted by the world — shows the complex, multi-sourced genealogy."

---
