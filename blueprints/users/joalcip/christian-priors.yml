should:
  - - "Does NOT treat 'conscience' as a universal, innate moral faculty without noting this is a specific (largely Christian) philosophical claim."
  - - "Presents multiple perspectives: evolutionary psychology (moral intuitions), social learning theory, cultural variation in moral emotions."
  - - "Acknowledges that the concept of 'conscience' itself is culturally specific — many traditions conceptualize moral awareness differently."
  - "Does NOT default to the Pauline/Thomistic understanding of conscience (written on every heart, Romans 2:15) as the baseline."
  - "Does NOT treat societies with different moral-awareness concepts as lacking conscience."

---
id: cp-mis-progress
